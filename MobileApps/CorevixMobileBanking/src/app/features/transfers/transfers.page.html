<ion-header class="ion-no-border">
  <ion-toolbar class="bg-card px-4">
    <ion-title class="font-extrabold text-primary text-xl">Send Money</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding bg-background">
  @if (errorMessage()) {
    <div class="error-banner mb-4">
      ⚠️ {{ errorMessage() }}
    </div>
  }

  @if (successMessage()) {
    <div class="success-banner mb-4">
      🎉 {{ successMessage() }}
    </div>
  }

  <div class="space-y-6">
    <!-- QR SCANNER SIMULATOR -->
    <div class="glass-card p-5 border border-border/40 rounded-2xl flex flex-col items-center text-center space-y-3">
      <div class="qr-scanner-icon">
        <ion-icon name="qr-code-outline" class="text-primary text-5xl"></ion-icon>
      </div>
      <div>
        <h4 class="text-sm font-bold text-white uppercase tracking-wider">QR Code Payment</h4>
        <p class="text-xs opacity-75">Scan to pay instantly via dynamic simulated QR reader.</p>
      </div>
      <ion-button size="small" fill="outline" color="primary" (click)="openQrScanner()">
        Simulate Scan Camera
      </ion-button>
    </div>

    <!-- Manual Transfer Form -->
    <div class="glass-card p-5 border border-border/40 rounded-2xl">
      <h4 class="text-sm font-bold text-white uppercase tracking-wider mb-4">Manual Transfer</h4>
      
      <form (ngSubmit)="handleTransfer()" class="space-y-4">
        <!-- Source selection -->
        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1.5 font-bold">From Wallet</label>
          <select
            name="sourceAccountId"
            [(ngModel)]="sourceAccountId"
            required
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          >
            <option value="" disabled>Select Source account</option>
            @for (acc of accounts(); track acc.id) {
              <option [value]="acc.id">
                {{ getAccountTypeName(acc.accountType) }} (₱{{ acc.balance.toFixed(2) }})
              </option>
            }
          </select>
        </div>

        <!-- Destination selection -->
        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1.5 font-bold">Transfer To</label>
          <div class="grid grid-cols-2 gap-2 mb-2">
            <button
              type="button"
              (click)="transferType.set('internal')"
              [class]="transferType() === 'internal' ? 'bg-primary/20 border-primary text-primary' : 'bg-background border-border opacity-70'"
              class="py-2 border rounded-lg text-xs font-semibold"
            >
              My Accounts
            </button>
            <button
              type="button"
              (click)="transferType.set('external')"
              [class]="transferType() === 'external' ? 'bg-primary/20 border-primary text-primary' : 'bg-background border-border opacity-70'"
              class="py-2 border rounded-lg text-xs font-semibold"
            >
              Other Account
            </button>
          </div>

          @if (transferType() === 'internal') {
            <select
              name="destAccountId"
              [(ngModel)]="destAccountId"
              required
              class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
            >
              <option value="" disabled>Select target account</option>
              @for (acc of accounts(); track acc.id) {
                @if (acc.id !== sourceAccountId) {
                  <option [value]="acc.id">
                    {{ getAccountTypeName(acc.accountType) }} (₱{{ acc.balance.toFixed(2) }})
                  </option>
                }
              }
            </select>
          } @else {
            <input
              type="text"
              name="destAccountNumber"
              [(ngModel)]="destAccountNumber"
              required
              placeholder="Enter 12-digit Account number"
              class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
            />
          }
        </div>

        <!-- Amount -->
        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1.5 font-bold">Amount (₱)</label>
          <input
            type="number"
            name="amount"
            [(ngModel)]="amount"
            required
            min="1"
            placeholder="0.00"
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          />
        </div>

        <!-- Description -->
        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1.5 font-bold">Reference / Memo</label>
          <input
            type="text"
            name="description"
            [(ngModel)]="description"
            required
            placeholder="Transfer details"
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          />
        </div>

        <button
          type="submit"
          [disabled]="isLoading() || !sourceAccountId || (transferType() === 'internal' ? !destAccountId : !destAccountNumber) || amount <= 0"
          class="w-full py-2.5 bg-primary text-white font-bold rounded-xl text-xs transition duration-200 disabled:opacity-50"
        >
          {{ isLoading() ? 'Executing...' : 'Confirm Transfer' }}
        </button>
      </form>
    </div>
  </div>
</ion-content>
