<ion-header class="ion-no-border">
  <ion-toolbar class="bg-card px-4">
    <ion-title class="font-extrabold text-primary text-xl">Invest & Credit</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding bg-background">
  @if (errorMessage()) {
    <div class="error-banner mb-4">
      ⚠️ {{ errorMessage() }}
    </div>
  }

  @if (successMessage()) {
    <div class="success-banner mb-4">
      🎉 {{ successMessage() }}
    </div>
  }

  <div class="space-y-6">
    <!-- Wallet selection -->
    <div>
      <label class="block text-[10px] uppercase text-zinc-400 mb-1.5 font-bold">Funding Account</label>
      <select
        name="sourceAccountId"
        [(ngModel)]="sourceAccountId"
        required
        class="w-full px-3 py-2.5 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
      >
        <option value="" disabled>Select Source account</option>
        @for (acc of accounts(); track acc.id) {
          <option [value]="acc.id">
            {{ getAccountTypeName(acc.accountType) }} (₱{{ acc.balance.toFixed(2) }})
          </option>
        }
      </select>
    </div>

    <!-- Time Deposit investment panel -->
    <div class="glass-card p-5 border border-border/40 rounded-2xl space-y-4">
      <h4 class="text-sm font-bold text-white uppercase tracking-wider">Time Deposit Placement</h4>
      <p class="text-xs opacity-75">Invest surplus liquidity at guaranteed yield rates.</p>
      
      <div class="space-y-3">
        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1">Principal Amount (₱)</label>
          <input
            type="number"
            placeholder="Min ₱1,000"
            [(ngModel)]="tdAmount"
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          />
        </div>

        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1">Term Selection</label>
          <select
            [(ngModel)]="tdTerm"
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          >
            <option [value]="90">90 Days Term (4.50% APY)</option>
            <option [value]="180">180 Days Term (4.75% APY)</option>
            <option [value]="360">360 Days Term (5.00% APY)</option>
          </select>
        </div>

        <button
          [disabled]="isLoading() || !sourceAccountId || tdAmount < 1000"
          (click)="openTimeDeposit()"
          class="w-full py-2 bg-primary text-white font-bold rounded-xl text-xs disabled:opacity-50"
        >
          Confirm Placement
        </button>
      </div>
    </div>

    <!-- Loan application panel -->
    <div class="glass-card p-5 border border-border/40 rounded-2xl space-y-4">
      <h4 class="text-sm font-bold text-white uppercase tracking-wider">Personal Loan Request</h4>
      <p class="text-xs opacity-75">Apply for modern credit facilities backed by instant approval algorithms.</p>
      
      <div class="space-y-3">
        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1">Request Amount (₱)</label>
          <input
            type="number"
            placeholder="0.00"
            [(ngModel)]="loanAmount"
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          />
        </div>

        <div>
          <label class="block text-[10px] uppercase text-zinc-400 mb-1">Payment Period</label>
          <select
            [(ngModel)]="loanTerm"
            class="w-full px-3 py-2 border border-border rounded-xl bg-background text-foreground text-xs focus:outline-none"
          >
            <option [value]="12">12 Months (6.00% p.a.)</option>
            <option [value]="24">24 Months (6.50% p.a.)</option>
            <option [value]="36">36 Months (7.00% p.a.)</option>
          </select>
        </div>

        <button
          [disabled]="isLoading() || !sourceAccountId || loanAmount <= 0"
          (click)="applyLoan()"
          class="w-full py-2 bg-primary text-white font-bold rounded-xl text-xs disabled:opacity-50"
        >
          Submit Loan Request
        </button>
      </div>
    </div>
  </div>
</ion-content>
